                    </div>
                    <div class="editor-toolbar-group">
                        <button type="button"
                                data-action="show-grid"
                                data-toggle="true"
                                title="Toggle grid visibility"><svg width="16"
                                 height="16"
                                 aria-hidden="true">
                                <use href="#icon-grid" />
                            </svg></button>
                        <button type="button"
                                data-action="snap-grid"
                                data-toggle="true"
                                title="Toggle snap to grid"><svg width="16"
                                 height="16"
                                 aria-hidden="true">
                                <use href="#icon-snap" />
                            </svg></button>
                    </div>
                    <div class="editor-toolbar-group editor-toolbar-group-controls"
                         aria-label="Font controls">
                        <label>
                            Font
                            <select id="font-face-select"></select>
                        </label>
                        <label>
                            Size
                            <select id="font-size-select"></select>
                        </label>
                        <label>
                            Text
                            <div id="text-preset-select"></div>
                        </label>
                        <input id="text-color-input"
                               type="color"
                               aria-label="Custom text color" />
                    </div>
                    <div class="editor-toolbar-group editor-toolbar-group-controls"
                         aria-label="Line controls">
                        <label>
                            Line
                            <div id="stroke-preset-select"></div>
                        </label>
                        <input id="stroke-color-input"
                               type="color"
                               aria-label="Custom line color" />
                        <label>
                            Width
                            <div id="line-width-select"></div>
                        </label>
                    </div>
                    <div class="editor-toolbar-group editor-toolbar-group-controls"
                         aria-label="Fill controls">
                        <label>
                            Fill
                            <div id="fill-preset-select"></div>
                        </label>
                        <input id="fill-color-input"
                               type="color"
                               aria-label="Custom fill color" />
                    </div>
                </div>

                <div class="editor-workbench">
                    <aside class="editor-toolbar"
                           aria-label="Tool palette">
                        <div id="editor-tool-list"
                             class="editor-tool-list"></div>
                    </aside>
                    <div id="editor-demo"
                         class="canvas-frame tall"></div>
                </div>
