<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1" />
    <title>Editor Demo (Components)</title>
    <link rel="stylesheet"
          href="../demo.css" />
    <link rel="stylesheet"
          href="./demo-components.css" />
</head>

<body>
    <main class="page">
        <div class="shell">
            <header class="topbar">
                <div class="brand">Kitchen Sink Editor (Components)</div>
                <nav class="nav">
                    <a href="../view/state-machine.html">View demo</a>
                    <a href="../index.html">Demo gallery</a>
                    <a href="../../index.html">Docs</a>
                </nav>
            </header>

            <section class="canvas-card">
                <p class="note">This page mirrors the kitchen sink editor but delegates most toolbar/palette behavior to
                    library components.</p>

                <div id="component-action-toolbar"
                     class="editor-top-toolbar"
                     aria-label="Editor actions"></div>

                <div class="editor-top-toolbar"
                     aria-label="Style controls">
                    <div class="editor-toolbar-group editor-toolbar-group-controls"
                         aria-label="Font controls">
                        <label>
                            Font
                            <div id="font-face-select"></div>
                        </label>
                        <label>
                            <div id="font-size-select"></div>
                        </label>
                        <label>
                            <div id="text-preset-select"></div>
                        </label>
                    </div>
                    <div class="editor-toolbar-group editor-toolbar-group-controls"
                         aria-label="Line controls">
                        <label>
                            Line
                            <div id="stroke-preset-select"></div>
                        </label>
                        <label>
                            Width
                            <div id="line-width-select"></div>
                        </label>
                    </div>
                    <div class="editor-toolbar-group editor-toolbar-group-controls"
                         aria-label="Fill controls">
                        <label>
                            Fill
                            <div id="fill-preset-select"></div>
                        </label>
                    </div>
                </div>

                <div class="editor-workbench">
                    <aside class="editor-toolbar"
                           aria-label="Tool palette">
                        <div id="component-tool-list"
                             class="editor-tool-list"></div>
                    </aside>
                    <div id="editor-components-demo"
                         class="canvas-frame tall"></div>
                </div>

                </section>
            -->
            </section>
        </div>
    </main>
    <script type="module"
            src="./editor-components.js"></script>
</body>

</html>
